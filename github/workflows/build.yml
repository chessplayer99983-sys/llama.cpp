name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Reassemble model
      run: |
        cd examples/llama.android/app/src/main/assets/
        cat p* > mfinal.gguf
        rm p*
        ls -la
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build APK
      working-directory: examples/llama.android
      run: |
        chmod +x ./gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NepalBot
        path: examples/llama.android/app/build/outputs/apk/debug/app-debug.apk
